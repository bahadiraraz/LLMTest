# .github/workflows/llm-tests.yml
# Example CI/CD workflow for running llmtest in GitHub Actions

name: LLM Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  llm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Run LLM tests
        run: pytest -m llmtest --tb=short --junitxml=llmtest-results.xml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llmtest-results
          path: llmtest-results.xml

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: llmtest-results.xml
          check_name: LLM Test Results
