[project]
name = "llmtest-openai"
version = "0.1.0"
description = "OpenAI provider for llmtest"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Bahadır Araz", email = "bahadiraraz@protonmail.com" }]
dependencies = [
    "llmtest-core>=0.1.0",
    "openai>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
