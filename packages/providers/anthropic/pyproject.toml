[project]
name = "llmtest-anthropic"
version = "0.2.0"
description = "Anthropic provider for llmtest"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Bahadır Araz", email = "bahadiraraz@protonmail.com" }]
dependencies = [
    "llmtest-core>=0.1.0",
    "anthropic>=0.30",
]

[project.entry-points."llmtest.providers"]
anthropic = "provider:AnthropicProvider"

[tool.uv.sources]
llmtest-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
