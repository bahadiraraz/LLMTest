[project]
name = "llmtest-ollama"
version = "0.1.0"
description = "Ollama provider for llmtest"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Bahadır Araz", email = "bahadiraraz@protonmail.com" }]
dependencies = [
    "llmtest-core>=0.1.0",
    "httpx>=0.25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
