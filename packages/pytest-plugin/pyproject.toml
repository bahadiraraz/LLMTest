[project]
name = "llmtest-pytest"
version = "0.2.0"
description = "pytest plugin for llmtest"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Bahadır Araz", email = "bahadiraraz@protonmail.com" }]
dependencies = [
    "llmtest-core>=0.1.0",
    "pytest>=7.0",
]

[tool.uv.sources]
llmtest-core = { workspace = true }

[project.entry-points."pytest11"]
llmtest = "llmtest_pytest.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llmtest_pytest"]
