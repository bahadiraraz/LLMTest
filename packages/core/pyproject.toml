[project]
name = "llmtest-core"
version = "0.2.0"
description = "Core library for llmtest — Pydantic models, assertions, runners"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Bahadır Araz", email = "bahadiraraz@protonmail.com" }]
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
schema = ["jsonschema>=4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llmtest_core"]
